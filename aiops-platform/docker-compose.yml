version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: aiops-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aiops
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aiops-network

  redis:
    image: redis:7-alpine
    container_name: aiops-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiops-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiops-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/aiops
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - aiops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiops-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - aiops-network

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  aiops-network:
    driver: bridge
