{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-backend-dashboard
  labels:
    grafana_dashboard: "1"
data:
  aiops-backend.json: |
    {
      "title": "AIOps Backend",
      "uid": "aiops-backend",
      "timezone": "browser",
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "Request rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(aiops_backend_http_requests_total[5m])) by (route)"
            }
          ]
        },
        {
          "id": 2,
          "title": "p95 latency (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(aiops_backend_http_request_duration_seconds_bucket[5m])) by (le, route))"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error rate (5xx / total)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(aiops_backend_http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(aiops_backend_http_requests_total[5m]))",
              "legendFormat": "error ratio"
            }
          ]
        },
        {
          "id": 4,
          "title": "Process resident memory (MB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "aiops_backend_process_resident_memory_bytes / 1024 / 1024",
              "legendFormat": "RSS MB"
            }
          ]
        }
      ]
    }
{{- end }}
