stages:
  - security

variables:
  DOCKER_IMAGE: "khalil512/radiology:latest"

# ─── Trivy — scan l'image DockerHub directement (remote, pas besoin de Docker socket) ───
trivy:scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image
        --format json
        --output trivy-report.json
        --severity CRITICAL,HIGH,MEDIUM,LOW
        --timeout 10m
        --image-src remote
        $DOCKER_IMAGE
    - echo "=== CVEs critiques et hauts ==="
    - trivy image
        --format table
        --severity CRITICAL,HIGH
        --image-src remote
        $DOCKER_IMAGE
        || true
  artifacts:
    name: "trivy-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - trivy-report.json
    expire_in: 7 days
    when: always
  allow_failure: true
