stages:
  - security

variables:
  DOCKER_IMAGE: "khalil512/radiology:latest"

# ─── Trivy — scan l'image DockerHub ───────────────────────
trivy:scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - echo "$DOCKERHUB_TOKEN" | trivy registry login --username khalil512 --password-stdin registry-1.docker.io || true
  script:
    - trivy image
        --format json
        --output trivy-report.json
        --severity CRITICAL,HIGH,MEDIUM,LOW
        --timeout 10m
        $DOCKER_IMAGE
    - echo "=== CVEs critiques et hauts ==="
    - trivy image
        --format table
        --severity CRITICAL,HIGH
        $DOCKER_IMAGE
        || true
  artifacts:
    name: "trivy-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - trivy-report.json
    expire_in: 7 days
    when: always
  allow_failure: true
